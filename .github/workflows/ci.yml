name: Backend CI & Keep Alive

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  # ---------------------------
  # Cron job
  # ---------------------------
  schedule:
    - cron: "*/10 * * * *"

jobs:
  # ---------------------------
  # CI JOB
  # ---------------------------
  test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v1-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest


  # ---------------------------
  # KEEP ALIVE JOB (cron )
  # ---------------------------
  keep_alive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render health endpoint
        run: |
          curl -sSf https://portfolio-chatbot-eby9.onrender.com/docs/health || exit 1